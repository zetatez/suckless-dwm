app:
  name: assistant
  port: 4321
  interface: wlan0

auth:
  username: admin
  password: AAaa00__

log:
  level: debug
  filename: ~/.config/assistant/logs/assistant.log
  max_size_mb: 16
  max_backups: 7
  max_age_days: 14
  compress: true
  format: text
  console: true

llm:
  provider: minimax
  api_key: "${MINIMAX_API_KEY}"
  base_url: https://api.minimaxi.com
  model: MiniMax-M2.5
  timeout: 60
  max_tokens: 4096
  temperature: 0.2

channels:
  feishu:
    app_id: "${FEISHU_APP_ID}"
    app_secret: "${FEISHU_APP_SECRET}"
    chat_id: "${FEISHU_CHAT_ID}"

background:
  enabled: true
  procs:
    - name: picom
      command: picom --config ~/.config/picom/picom.conf
    - name: xset
      command: xset r rate 158 128
    - name: dunst
      command: dunst
    - name: clipmenud
      command: clipmenud

svc:
  vpn_proxy: "socks5://127.0.0.1:7891"
  default_monitor: "eDP-1"
  dir_wallpaper: "~/Pictures/wallpapers"
  dir_working_logbook: "~/git/working/logbook"
  path_keyboard_brightness: "/sys/class/leds/tpacpi::kbd_backlight/brightness"
  terminal_default: "st"
  path_ssh_secret: "~/.ssh/my.ssh.json"


basePath: /
definitions:
  llmproxy.proxyChatRequest:
    properties:
      messages:
        items: {}
        type: array
      model:
        type: string
      stream:
        type: boolean
    type: object
  response.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  svc.DatetimeConvertRequest:
    properties:
      from:
        type: string
      to:
        type: string
    required:
    - from
    - to
    type: object
  svc.DirRequest:
    properties:
      dir:
        type: string
    type: object
  svc.FormatRequest:
    properties:
      language:
        type: string
    required:
    - language
    type: object
  svc.LaunchRequest:
    properties:
      command:
        type: string
    required:
    - command
    type: object
  svc.NoteRequest:
    properties:
      type:
        type: string
    required:
    - type
    type: object
  svc.OpenURLRequest:
    properties:
      browser:
        type: string
      url:
        type: string
    required:
    - url
    type: object
  svc.QueryRequest:
    properties:
      query:
        type: string
    required:
    - query
    type: object
  svc.ToggleRequest:
    properties:
      match:
        type: string
      process:
        type: string
    required:
    - match
    - process
    type: object
host: 127.0.0.1:4321
info:
  contact: {}
  description: Assistant backend service API
  title: Assistant API
  version: "1.0"
paths:
  /api/filebrowser/copy:
    post:
      consumes:
      - application/json
      parameters:
      - description: '{paths, dest}'
        in: body
        name: body
        required: true
        schema:
          type: object
      responses: {}
      summary: 复制文件/目录到目标目录
      tags:
      - 文件浏览
  /api/filebrowser/delete:
    post:
      consumes:
      - application/json
      parameters:
      - description: '{paths}'
        in: body
        name: body
        required: true
        schema:
          type: object
      responses: {}
      summary: 删除文件/目录
      tags:
      - 文件浏览
  /api/filebrowser/download:
    get:
      parameters:
      - description: 相对 root 的文件路径
        in: query
        name: path
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            type: file
      summary: 下载文件
      tags:
      - 文件浏览
  /api/filebrowser/download-tgz:
    get:
      description: 将指定路径列表(文件或目录)打包为 tar.gz 下载
      parameters:
      - description: 路径(可重复 path=a&path=b)
        in: query
        name: paths
        type: string
      responses:
        "200":
          description: OK
          schema:
            type: file
      summary: 下载选中文件/目录为 tar.gz
      tags:
      - 文件浏览
  /api/filebrowser/list:
    get:
      parameters:
      - description: 相对 root 的路径(空=root)
        in: query
        name: path
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 列出目录
      tags:
      - 文件浏览
  /api/filebrowser/mkdir:
    post:
      consumes:
      - application/json
      parameters:
      - description: '{path}'
        in: body
        name: body
        required: true
        schema:
          type: object
      responses: {}
      summary: 创建目录
      tags:
      - 文件浏览
  /api/filebrowser/move:
    post:
      consumes:
      - application/json
      parameters:
      - description: '{paths, dest}'
        in: body
        name: body
        required: true
        schema:
          type: object
      responses: {}
      summary: 移动文件/目录到目标目录
      tags:
      - 文件浏览
  /api/filebrowser/raw:
    get:
      parameters:
      - description: 相对 root 的文件路径
        in: query
        name: path
        required: true
        type: string
      - description: 1=生成缩略图(仅图片)
        in: query
        name: thumb
        type: string
      responses:
        "200":
          description: OK
          schema:
            type: file
      summary: 在线预览文件
      tags:
      - 文件浏览
  /api/filebrowser/rename:
    post:
      consumes:
      - application/json
      parameters:
      - description: '{path, new_name}'
        in: body
        name: body
        required: true
        schema:
          type: object
      responses: {}
      summary: 重命名文件/目录
      tags:
      - 文件浏览
  /api/filebrowser/touch:
    post:
      consumes:
      - application/json
      parameters:
      - description: '{path}'
        in: body
        name: body
        required: true
        schema:
          type: object
      responses: {}
      summary: 创建空文件（不覆盖）
      tags:
      - 文件浏览
  /api/filebrowser/trash:
    get:
      responses: {}
      summary: 列出回收站
      tags:
      - 文件浏览
  /api/filebrowser/trash/delete:
    post:
      consumes:
      - application/json
      parameters:
      - description: '{trash_names}'
        in: body
        name: body
        required: true
        schema:
          type: object
      responses: {}
      summary: 从回收站永久删除
      tags:
      - 文件浏览
  /api/filebrowser/trash/restore:
    post:
      consumes:
      - application/json
      parameters:
      - description: '{trash_names}'
        in: body
        name: body
        required: true
        schema:
          type: object
      responses: {}
      summary: 从回收站恢复
      tags:
      - 文件浏览
  /api/filebrowser/upload:
    post:
      consumes:
      - multipart/form-data
      description: multipart/form-data 上传; 字段 file 为文件(可多个), path 为目标目录(相对 root, 空=root)
      parameters:
      - description: 目标目录(相对 root)
        in: formData
        name: path
        type: string
      - description: 文件(可多个)
        in: formData
        name: file
        required: true
        type: file
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 上传文件(不覆盖，支持多文件)
      tags:
      - 文件浏览
  /api/health:
    get:
      description: 检查服务健康状态
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务不健康
          schema:
            $ref: '#/definitions/response.Response'
      summary: 健康检查
      tags:
      - 健康检查
  /api/llm/v1/chat/completions:
    post:
      parameters:
      - description: 请求体
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/llmproxy.proxyChatRequest'
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 聊天补全(自动路由到可用供应商)
      tags:
      - LLM代理
  /api/llm/v1/models:
    get:
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 列出可用模型
      tags:
      - LLM代理
  /api/llm/v1/models/{model}:
    get:
      parameters:
      - description: 模型ID
        in: path
        name: model
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 查询模型详情
      tags:
      - LLM代理
  /api/svr/convert-datetime:
    post:
      consumes:
      - application/json
      description: 从剪贴板读取时间字符串，转换后写回剪贴板

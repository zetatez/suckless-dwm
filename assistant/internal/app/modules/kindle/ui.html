<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Info</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8f8f0}
.fstoggle{position:fixed;top:0;right:0;width:60px;height:60px;z-index:99;background:transparent;cursor:pointer}
</style>
</head>
<body>
<div id="content"></div>
<div class="fstoggle" onclick="var e=document.documentElement;document.fullscreenElement?document.exitFullscreen():e.requestFullscreen?e.requestFullscreen():e.webkitRequestFullscreen?e.webkitRequestFullscreen():''"></div>
<script>
var scrollTimer;
function startScroll(){
	var el=document.querySelector('.news-row')
	if(!el)return
	if(scrollTimer)clearInterval(scrollTimer)
	var max=el.scrollHeight-el.clientHeight
	if(max<=0)return
	var dir=1,pause=0
	scrollTimer=setInterval(function(){
		if(pause>0){pause--;return}
		var pos=el.scrollTop+dir
		if(pos>=max){el.scrollTop=max;pause=40;dir=-1;return}
		if(pos<=0){el.scrollTop=0;pause=40;dir=1;return}
		el.scrollTop=pos
	},50)
}
function loadContent(){
	fetch('/ui/kindle/content').then(function(r){return r.text()}).then(function(html){
		var d=new DOMParser().parseFromString(html,'text/html')
		document.getElementById('content').innerHTML=d.body.innerHTML
		var old=document.getElementById('cs')
		if(old)old.remove()
		var s=d.querySelector('style')
		if(s){var c=document.createElement('style');c.id='cs';c.textContent=s.textContent;document.head.appendChild(c)}
		startScroll()
	}).catch(function(){})
}
loadContent()
setInterval(loadContent,180000)
</script>
</body>
</html>

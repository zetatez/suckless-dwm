<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Helvetica","Arial",sans-serif;background:#f8f8f0;color:#000;padding:16px;max-width:1200px;margin:0 auto;font-size:16px}
.clock{font-size:56px;text-align:center;font-weight:bold;letter-spacing:2px;margin:12px 0 4px}
.date{font-size:16px;text-align:center;color:#666;margin-bottom:14px}
.info-row{display:flex;justify-content:center;align-items:flex-start;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.cal-wrap{text-align:center;margin:0}
.cal-month{font-size:15px;font-weight:bold;margin-bottom:6px;letter-spacing:1px}
table.cal{display:inline-block;border-collapse:collapse;font-size:15px}
table.cal td{text-align:center;padding:5px 9px;min-width:32px}
table.cal th{text-align:center;padding:4px 9px;min-width:32px;font-weight:normal;color:#aaa;font-size:13px}
table.cal td.today{background:#000;color:#fff;font-weight:bold}
table.cal td.weekend,table.cal th.wd{color:#ccc}
.top-row{display:flex;gap:16px;margin-top:10px}
.cal-col{flex:0 0 40%;min-width:0}
.chart-col{flex:1;min-width:0}
.chart-col svg{width:100%;height:auto}
.news-row{margin-top:16px;text-align:center;max-height:240px;overflow-y:auto}
.news-row ul{list-style:none;padding:0;display:inline-block;text-align:left}
.news-row li{padding:5px 0;border-bottom:1px solid #eee}
.news-row a{color:#000;text-decoration:none;font-size:15px;display:block;padding-left:12px}
.footer{text-align:center;margin-top:10px;font-size:11px;color:#bbb}
@media(max-width:600px){
body{padding:10px;font-size:14px}
.clock{font-size:44px;margin:8px 0 2px}
.date{font-size:14px}
table.cal td{padding:4px 6px;min-width:26px}
table.cal th{padding:3px 6px;min-width:26px;font-size:11px}
.news a{font-size:13px}
.news li{padding:5px 0}
}
@media(orientation:landscape) and (min-width:900px){
body{padding:24px}
.clock{font-size:72px}
.news-row a{font-size:16px}
.news-row li{padding:8px 0}
table.cal{font-size:16px}
table.cal td{padding:6px 11px;min-width:36px}
.top-row{gap:32px}
.chart-row{margin-top:24px}
.chart-row svg{max-width:800px}
}
</style>
</head>
<body>
<div class="clock">{{.Clock}}</div>
<div class="date">{{.Date}}</div>
<div class="top-row">
<div class="cal-col">{{.Calendar}}</div>
<div class="chart-col">{{.Market}}</div>
</div>
<div class="news-row">
<ul>{{.News}}</ul>
</div>
<div class="footer">1 min</div>
</body>
</html>
